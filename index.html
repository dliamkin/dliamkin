<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#121417">
    <script>
      // Dark is the site's default look; "light" is an explicit visitor choice
      // (see src/composables/useTheme.ts). Runs before any paint so there is
      // no light flash on load.
      (function () {
        var light = false;
        try {
          light = localStorage.getItem("theme") === "light";
        } catch (e) {
          /* storage unavailable — stay on the dark default */
        }
        if (light) {
          document.querySelector('meta[name="theme-color"]').setAttribute("content", "#ffffff");
        } else {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

    <!-- Primary SEO -->
    <title>Denis Liamkin — Senior Software Engineer</title>
    <meta name="description" content="Senior Software Engineer with 12+ years building full-stack enterprise applications across telehealth and real estate. Expert in Vue, Angular, C#/.NET, AWS, and Azure.">
    <meta name="author" content="Denis Liamkin">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://dliamkin.com/">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dliamkin.com/">
    <meta property="og:site_name" content="Denis Liamkin">
    <meta property="og:locale" content="en_US">
    <meta property="og:title" content="Denis Liamkin — Senior Software Engineer">
    <meta property="og:description" content="Senior Software Engineer with 12+ years building full-stack enterprise applications across telehealth and real estate. Expert in Vue, Angular, C#/.NET, AWS, and Azure.">
    <meta property="og:image" content="https://dliamkin.com/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Denis Liamkin — Senior Software Engineer">

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://dliamkin.com/">
    <meta name="twitter:title" content="Denis Liamkin — Senior Software Engineer">
    <meta name="twitter:description" content="Senior Software Engineer with 12+ years building full-stack enterprise applications across telehealth and real estate.">
    <meta name="twitter:image" content="https://dliamkin.com/og-image.png">
    <meta name="twitter:image:alt" content="Denis Liamkin — Senior Software Engineer">

    <!-- LCP: the hero portfolio wall's top-row images. The SPA only requests
         them after the JS bundle runs; preloading starts the fetch during HTML
         parse instead. Keep in sync with portfolioImages in HeroBanner.vue. -->
    <link rel="preload" as="image" href="/images/entomology.webp" fetchpriority="high">
    <link rel="preload" as="image" href="/images/resetu.webp" fetchpriority="high">

    <!-- Fonts: loaded async (media swap on load) so the stylesheet never
         blocks first paint; all families already use display=swap. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;500&family=JetBrains+Mono:wght@400;500;700&family=Quicksand:wght@300;400;500&family=Raleway:wght@400;700&display=swap" rel="stylesheet" media="print" onload="this.onload=null;this.media='all'">
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;500&family=JetBrains+Mono:wght@400;500;700&family=Quicksand:wght@300;400;500&family=Raleway:wght@400;700&display=swap" rel="stylesheet">
    </noscript>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
