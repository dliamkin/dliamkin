<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500&family=Raleway:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      background: #111317;
      font-family: 'Raleway', sans-serif;
      overflow: hidden;
      position: relative;
    }

    .bg-glow {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 80% at 12% 55%, rgba(39, 169, 224, 0.14), transparent),
        radial-gradient(ellipse 40% 50% at 75% 10%, rgba(92, 184, 92, 0.08), transparent);
    }

    /* subtle grid texture */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .photo-wrap {
      position: absolute;
      right: 0;
      top: 0;
      width: 520px;
      height: 630px;
      overflow: hidden;
    }

    /* left-to-right fade so photo bleeds into the dark background */
    .photo-wrap::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 200px;
      height: 100%;
      background: linear-gradient(to right, #111317 0%, transparent 100%);
      z-index: 2;
    }

    /* bottom vignette on the photo */
    .photo-wrap::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 120px;
      background: linear-gradient(to top, #111317, transparent);
      z-index: 2;
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 10%;
      display: block;
    }

    .content {
      position: absolute;
      left: 70px;
      top: 50%;
      transform: translateY(-50%);
      width: 590px;
      z-index: 10;
    }

    .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      font-weight: 400;
      color: #27a9e0;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .eyebrow::after {
      content: '';
      display: block;
      width: 40px;
      height: 1px;
      background: #27a9e0;
      opacity: 0.5;
    }

    .name {
      font-family: 'Quicksand', sans-serif;
      font-weight: 300;
      font-size: 88px;
      line-height: 0.9;
      color: #ffffff;
      letter-spacing: -0.02em;
      margin-bottom: 28px;
    }

    .name strong {
      font-weight: 500;
    }

    .accent-bar {
      width: 56px;
      height: 3px;
      background: linear-gradient(to right, #27a9e0, #5cb85c);
      border-radius: 2px;
      margin-bottom: 28px;
    }

    .tagline {
      font-family: 'Raleway', sans-serif;
      font-weight: 400;
      font-size: 20px;
      line-height: 1.55;
      color: #8a9bb0;
      margin-bottom: 38px;
      max-width: 460px;
    }

    .tagline em {
      font-style: normal;
      color: #c2cfd9;
      font-weight: 600;
    }

    .url-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .url-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #5cb85c;
    }

    .url {
      font-family: 'JetBrains Mono', monospace;
      font-size: 17px;
      font-weight: 400;
      color: #5cb85c;
      letter-spacing: 0.04em;
    }

    /* bottom-left corner mark */
    .corner-mark {
      position: absolute;
      bottom: 30px;
      left: 70px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-grid"></div>

  <div class="photo-wrap">
    <img id="photo" src="" alt="Denis Liamkin">
  </div>

  <div class="content">
    <div class="eyebrow">// Senior Software Engineer</div>
    <div class="name"><strong>Denis</strong><br>Liamkin</div>
    <div class="accent-bar"></div>
    <div class="tagline">
      <em>12+ years</em> building full-stack enterprise<br>
      applications that feel weightless.
    </div>
    <div class="url-row">
      <div class="url-dot"></div>
      <div class="url">dliamkin.com</div>
    </div>
  </div>

  <div class="corner-mark">Vue · C#/.NET · AWS · Azure</div>
</body>
</html>
