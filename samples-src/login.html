<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Acmetrics — Sign in</title>
<style>
	* { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", Arial, sans-serif; }
	body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #eef2f7 0%, #dde7f0 100%); }
	.card { width: 400px; background: #fff; border-radius: 12px; box-shadow: 0 10px 30px rgba(30, 50, 70, 0.12); padding: 2.5rem; }
	.logo { display: flex; align-items: center; gap: 0.6rem; justify-content: center; margin-bottom: 0.75rem; }
	.logo-mark { width: 34px; height: 34px; border-radius: 8px; background: #3466d6; color: #fff; font-weight: 800; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
	.logo-name { font-size: 1.35rem; font-weight: 700; color: #23324d; }
	.subtitle { text-align: center; color: #7a8699; font-size: 0.92rem; margin-bottom: 1.75rem; }
	label { display: block; font-size: 0.85rem; font-weight: 600; color: #3d4a5f; margin-bottom: 0.35rem; }
	input[type="email"], input[type="password"] { width: 100%; padding: 0.65rem 0.8rem; border: 1px solid #cdd6e1; border-radius: 8px; font-size: 0.95rem; margin-bottom: 1.1rem; }
	.row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.4rem; font-size: 0.85rem; }
	.remember { display: flex; align-items: center; gap: 0.4rem; color: #3d4a5f; }
	.forgot { color: #3466d6; text-decoration: none; font-weight: 600; }
	.btn { width: 100%; padding: 0.75rem; border: none; border-radius: 8px; background: #3466d6; color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; }
	.divider { display: flex; align-items: center; gap: 0.75rem; color: #9aa6b5; font-size: 0.8rem; margin: 1.25rem 0; }
	.divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #e1e7ee; }
	.btn-alt { width: 100%; padding: 0.7rem; border: 1px solid #cdd6e1; border-radius: 8px; background: #fff; color: #3d4a5f; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
	.signup { text-align: center; margin-top: 1.5rem; font-size: 0.88rem; color: #7a8699; }
	.signup a { color: #3466d6; font-weight: 600; text-decoration: none; }
</style>
</head>
<body>
	<div class="card">
		<div class="logo"><div class="logo-mark">A</div><div class="logo-name">Acmetrics</div></div>
		<p class="subtitle">Sign in to your workspace</p>
		<label for="email">Email address</label>
		<input id="email" type="email" placeholder="you@company.com" />
		<label for="password">Password</label>
		<input id="password" type="password" placeholder="••••••••" />
		<div class="row">
			<label class="remember"><input type="checkbox" checked /> Remember me</label>
			<a class="forgot" href="#">Forgot password?</a>
		</div>
		<button class="btn">Sign in</button>
		<div class="divider">or</div>
		<button class="btn-alt">Continue with SSO</button>
		<p class="signup">Don't have an account? <a href="#">Start a free trial</a></p>
	</div>
</body>
</html>
