<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Eval fixture — not a UI</title>
<style>
	* { margin: 0; padding: 0; }
	body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0d1b2a; }
	svg { display: block; }
</style>
</head>
<body>
	<!-- A simple SVG landscape scene: an eval-suite negative fixture. The
	     Screenshot → PrimeVue pipeline must classify this as NOT a UI
	     screenshot. No text, no buttons, no rectangles-that-look-like-cards. -->
	<svg width="1280" height="800" viewBox="0 0 1280 800" role="img" aria-label="Stylized landscape">
		<defs>
			<linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
				<stop offset="0%" stop-color="#ffb347" />
				<stop offset="55%" stop-color="#ff8c69" />
				<stop offset="100%" stop-color="#c96f8e" />
			</linearGradient>
			<linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
				<stop offset="0%" stop-color="#d98a9e" />
				<stop offset="100%" stop-color="#5a4a7a" />
			</linearGradient>
		</defs>
		<rect width="1280" height="520" fill="url(#sky)" />
		<circle cx="640" cy="430" r="90" fill="#fff3d6" opacity="0.95" />
		<polygon points="0,520 220,300 430,520" fill="#7a5c8e" />
		<polygon points="300,520 560,240 820,520" fill="#5e4477" />
		<polygon points="700,520 960,320 1220,520" fill="#6d5185" />
		<polygon points="1050,520 1280,360 1280,520" fill="#7a5c8e" />
		<rect y="520" width="1280" height="280" fill="url(#water)" />
		<ellipse cx="640" cy="560" rx="180" ry="10" fill="#ffe9c2" opacity="0.55" />
		<ellipse cx="640" cy="600" rx="120" ry="7" fill="#ffe9c2" opacity="0.35" />
		<ellipse cx="640" cy="640" rx="70" ry="5" fill="#ffe9c2" opacity="0.25" />
		<path d="M 150 180 q 40 -30 80 0 q 40 30 80 0" stroke="#fff" stroke-width="6" fill="none" opacity="0.6" stroke-linecap="round" />
		<path d="M 950 140 q 35 -25 70 0 q 35 25 70 0" stroke="#fff" stroke-width="5" fill="none" opacity="0.5" stroke-linecap="round" />
	</svg>
</body>
</html>
