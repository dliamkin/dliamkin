schema: spec-driven
context: |
  Tech stack: Poetry, Python, SQLAlchemy, Alembic, Dash + Dash Bootstrap Components (VAPOR theme) + Plotly (plotly_dark template)
  Testing: Pytest, Pytest-asyncio (TDD: write tests before implementation)
  Linting/formatting: ruff format + ruff check (line-length 100), mypy (all configured in pyproject.toml)
  Scheduler: scheduler.py (local); migration target is AWS ECS Fargate (long-running process)
  Domain: Finance and stock trading — equities and options paper trading,
          driven by current-event sentiment signals from Alpaca, Kalshi, and news sources
  Money/price values: always Decimal, never float
  Deployment note: new code must be container-friendly — no hardcoded local paths,
                   config via environment variables, logging to stdout

rules:
  proposal:
    - Include rollback plan
    - Always include a non goals section
    - Always layout priority
    - Sketch the testing strategy: identify what will be unit-tested vs integration-tested
    - Call out any new Alembic migrations required
    - Note any new or modified scheduler jobs

  specs:
    - Use Given/When/Then format for all scenarios
    - Reference existing patterns before inventing new ones
    - Every external API interaction (Alpaca, Kalshi) must include a failure/timeout scenario
    - Scenarios involving price, P&L, Greeks, or portfolio values must specify Decimal precision
    - Dashboard UI scenarios must include an empty-state case (no data available) and a loading state (data still fetching)

  design:
    - New database tables must include an Alembic migration in the migration plan section
    - Signal, selector, and scoring logic should be pure functions — no DB session in the signature
    - Dash callbacks must delegate to pure functions; no business logic inside the callback itself
    - SQLAlchemy sessions must not be reused across scheduler job boundaries — open and close per job
    - Use Decimal for all price, money, and Greeks values; document where Alpaca returns floats requiring conversion
    - Hard-coded risk control constants belong in risk_controls.py — not in caller code
    - New scheduler jobs: note whether async is required to avoid blocking (especially when mixing API calls with dbt)
    - Container-friendly design: config via environment variables, logging to stdout, no local file path assumptions
    - All new functions and methods must include type annotations (parameters and return type)
    - Dashboard pages must use the existing VAPOR + plotly_dark theme — no inline color overrides or alternative themes
    - Reuse components from dashboard/components/ before building new ones; new shared components belong there too
    - Financial values use Bootstrap color semantics: success (green) for profit/positive, danger (red) for loss/negative — never hardcoded hex colors
    - State shared across callbacks goes in dcc.Store, not module-level globals
    - Layout uses dbc.Row/dbc.Col (Bootstrap grid) — avoid html.Div with custom flexbox styles
    - Wrap data-fetching callbacks with dcc.Loading so users see a spinner during slow queries

  tasks:
    - Follow TDD order within each capability group: test task first, then implementation task
    - After writing tests for a group, include an explicit task to run pytest on those tests (confirm red/failing)
    - After implementing a group, include an explicit task to run pytest to confirm passing (green)
    - Alembic migration tasks must appear before any task that inserts or queries the new tables
    - Dashboard tasks must include a manual visual check step
    - Final tasks in every tasks.md: (1) run full pytest suite, (2) run ruff format and ruff check on modified files, (3) run mypy on modified files